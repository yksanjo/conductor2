name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # tmux is needed for the fire/stop integration tests; without it those tests self-skip,
      # but installing it keeps the full suite (including the live tmux path) exercised in CI.
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm test
